<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeEnd - 强制中断计时器</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TimeEnd</h1>
            <p class="subtitle">专注工作，强制休息</p>
        </div>

        <div class="timer-display">
            <div id="time-display" class="time-text">25:00</div>
            <div id="status-text" class="status-text">准备就绪</div>
        </div>

        <div class="stats-section">
            <div class="stat-item">
                <span class="stat-label">已完成</span>
                <span id="completed-sessions" class="stat-value">0</span>
                <span class="stat-unit">次专注</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">今日已专注</span>
                <span id="today-minutes" class="stat-value">0</span>
                <span class="stat-unit">分钟</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">累积已专注</span>
                <span id="total-minutes" class="stat-value">0</span>
                <span class="stat-unit">分钟</span>
            </div>
            <div id="rest-stat-item" class="stat-item rest-stat" style="display: none;">
                <span class="stat-label">本次休息</span>
                <span id="rest-minutes" class="stat-value rest-value">0</span>
                <span class="stat-unit">分钟</span>
            </div>
        </div>

        <div class="config-section">
            <div class="config-item">
                <span class="config-icon">🍅</span>
                <span id="focus-duration" class="config-value">25</span>
                <span class="config-unit">分钟</span>
            </div>
            <div class="config-item">
                <span class="config-icon">☕</span>
                <span id="break-duration" class="config-value">5</span>
                <span class="config-unit">分钟</span>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn btn-primary">开始</button>
            <button id="pause-btn" class="btn btn-secondary" disabled>暂停</button>
            <button id="stop-btn" class="btn btn-danger" disabled>停止</button>
            <button id="config-btn" class="btn btn-config">⚙️ 设置</button>
            <button id="minimize-btn" class="btn btn-config">最小化</button>
            <button id="record-btn" class="btn btn-config">📋 记录</button>
        </div>
    </div>

    <!-- 配置对话框 -->
    <div id="config-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="focus-input">专注时长（分钟）:</label>
                    <input type="number" id="focus-input" min="1" max="120" value="25">
                </div>
                <div class="form-group">
                    <label for="break-input">休息时长（分钟）:</label>
                    <input type="number" id="break-input" min="1" max="60" value="5">
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-config-btn" class="btn btn-primary">保存</button>
                <button id="cancel-config-btn" class="btn btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <!-- 记录弹窗 -->
    <div id="record-modal" class="modal">
        <div class="modal-content modal-record">
            <div class="modal-header">
                <h2>📋 专注与休息记录</h2>
                <span class="close record-close">&times;</span>
            </div>
            <div class="modal-body record-body">
                <div class="record-tabs">
                    <button type="button" class="record-tab active" data-type="day">按天</button>
                    <button type="button" class="record-tab" data-type="week">按周</button>
                    <button type="button" class="record-tab" data-type="month">按月</button>
                </div>
                <div class="record-range day-range">
                    <button type="button" class="btn-range" data-offset="0">今天</button>
                    <button type="button" class="btn-range" data-offset="-1">昨天</button>
                    <input type="date" id="record-date" title="选择日期">
                </div>
                <div class="record-range week-range" style="display:none;">
                    <button type="button" class="btn-range" data-offset="0">本周</button>
                    <button type="button" class="btn-range" data-offset="-1">上周</button>
                </div>
                <div class="record-range month-range" style="display:none;">
                    <button type="button" class="btn-range" data-offset="0">本月</button>
                    <button type="button" class="btn-range" data-offset="-1">上月</button>
                </div>
                <div class="record-summary">
                    <span>专注 <strong id="record-focus-count">0</strong> 次，共 <strong id="record-focus-min">0</strong> 分钟</span>
                    <span>休息共 <strong id="record-rest-min">0</strong> 分钟</span>
                </div>
                <div class="record-list" id="record-list"></div>
            </div>
        </div>
    </div>

    <script src="scripts/main.js"></script>
</body>
</html>
