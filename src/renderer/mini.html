<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeEnd</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            overflow: hidden;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            width: 234px;
            padding: 6px 8px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-app-region: drag;
            user-select: none;
        }
        .time-text {
            font-size: 2em;
            font-weight: 800;
            color: #fff;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
            text-shadow: 0 0 14px rgba(255,255,255,0.5), 0 2px 4px rgba(0,0,0,0.2);
        }
        .status-text {
            font-size: 0.68em;
            color: rgba(255,255,255,0.9);
            margin-top: 1px;
        }
        .status-text.focusing { color: #ffeb3b; }
        .status-text.paused { color: #ff9800; }
        .rest-row {
            -webkit-app-region: no-drag;
            font-size: 0.68em;
            color: #27ae60;
            margin-top: 2px;
            display: none;
        }
        .rest-row.show { display: block; }
        .mini-btns {
            -webkit-app-region: no-drag;
            display: flex;
            gap: 5px;
            margin-top: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .mini-btn {
            padding: 3px 8px;
            font-size: 0.68em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            min-width: 48px;
        }
        .mini-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .mini-btn-start {
            background: #667eea;
            color: #fff;
        }
        .mini-btn-pause {
            background: #6c757d;
            color: #fff;
        }
        .mini-btn-stop {
            background: #e74c3c;
            color: #fff;
        }
        .mini-footer {
            -webkit-app-region: no-drag;
            display: flex;
            gap: 8px;
            margin-top: 4px;
            justify-content: center;
        }
        .restore-btn, .mini-btn-record {
            -webkit-app-region: no-drag;
            padding: 2px 8px;
            font-size: 0.62em;
            border: none;
            border-radius: 4px;
            background: rgba(255,255,255,0.9);
            color: #667eea;
            cursor: pointer;
        }
        .restore-btn:hover, .mini-btn-record:hover {
            background: #fff;
        }
        .mini-footer-extra {
            margin-top: 2px;
        }
        .mini-footer-layer {
            width: 100%;
            gap: 6px;
        }
        .mini-btn-extra {
            font-size: 0.6em;
        }
        .mini-btn-layer {
            flex: 1;
            font-size: 0.62em;
            color: #4b3f92;
        }
        .mini-btn-layer.active {
            background: rgba(255,255,255,1);
            color: #3c2d82;
            font-weight: 700;
            box-shadow: 0 0 0 1px rgba(76, 58, 146, 0.15) inset;
        }
        .mini-btn-quit {
            font-size: 0.6em;
            color: #c0392b;
        }
        .mini-btn-quit:hover {
            background: #ffebee;
        }
        .salary-strip {
            -webkit-app-region: no-drag;
            width: 100%;
            margin-top: 6px;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.16);
        }
        .salary-mini-line {
            font-size: 0.76em;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.97);
            line-height: 1.5;
            text-align: right;
            white-space: normal;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div id="time-display" class="time-text">25:00</div>
    <div id="status-text" class="status-text">准备就绪</div>
    <div id="rest-row" class="rest-row">本次休息：<span id="rest-minutes">0</span> 分钟</div>
    <div class="mini-btns">
        <button type="button" id="start-btn" class="mini-btn mini-btn-start">开始</button>
        <button type="button" id="pause-btn" class="mini-btn mini-btn-pause" disabled>暂停</button>
        <button type="button" id="stop-btn" class="mini-btn mini-btn-stop" disabled>停止</button>
    </div>
    <div id="salary-strip" class="salary-strip">
        <div id="salary-mini-line1" class="salary-mini-line"></div>
        <div id="salary-mini-line2" class="salary-mini-line"></div>
        <div id="salary-mini-line3" class="salary-mini-line"></div>
    </div>
    <div class="mini-footer">
        <button id="record-btn-mini" class="restore-btn mini-btn-record">📋 记录</button>
        <button id="restore-btn" class="restore-btn">还原</button>
    </div>
    <div class="mini-footer mini-footer-layer">
        <button id="layer-top-btn" class="restore-btn mini-btn-layer">最上层</button>
        <button id="layer-bottom-btn" class="restore-btn mini-btn-layer">最下层</button>
    </div>
    <div class="mini-footer mini-footer-extra">
        <button id="minimize-to-background-btn" class="restore-btn mini-btn-extra">最小化到后台</button>
        <button id="quit-app-btn" class="restore-btn mini-btn-quit">退出程序</button>
    </div>
    <script src="scripts/mini-renderer.js"></script>
</body>
</html>
