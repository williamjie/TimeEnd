<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>强制中断 - TimeEnd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .icon {
            font-size: 5em;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .message {
            font-size: 1.3em;
            margin-bottom: 30px;
            line-height: 1.6;
            opacity: 0.95;
        }

        .input-section {
            margin: 40px 0;
        }

        .input-label {
            display: block;
            font-size: 1.1em;
            margin-bottom: 15px;
            font-weight: 500;
        }

        #interrupt-input {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            text-align: center;
            transition: all 0.3s;
        }

        #interrupt-input:focus {
            outline: none;
            border-color: white;
            background: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        #interrupt-input::placeholder {
            color: #999;
        }

        .submit-btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2em;
            background: white;
            color: #e74c3c;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .skip-btn {
            margin-left: 12px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .skip-btn:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .warning {
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" id="page-icon">⏰</div>
        <h1 id="page-title">时间到！</h1>
        <div class="message" id="page-message">
            专注时间已结束，请记录你刚才完成的工作内容，然后休息一下。
        </div>
        <div class="input-section">
            <label for="interrupt-input" class="input-label" id="input-label">
                请输入你刚才完成的工作内容：
            </label>
            <input 
                type="text" 
                id="interrupt-input" 
                placeholder="例如：完成了项目文档的编写..."
                autofocus
            >
            <button id="submit-btn" class="submit-btn" disabled>
                提交并继续
            </button>
            <button type="button" id="skip-btn" class="submit-btn skip-btn" style="display: none;">
                跳过
            </button>
            <div class="warning" id="warning-el">
                ⚠️ 必须输入内容才能关闭此窗口
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const input = document.getElementById('interrupt-input');
        const submitBtn = document.getElementById('submit-btn');
        const skipBtn = document.getElementById('skip-btn');
        const warningEl = document.getElementById('warning-el');
        const pageIcon = document.getElementById('page-icon');
        const pageTitle = document.getElementById('page-title');
        const pageMessage = document.getElementById('page-message');
        const inputLabel = document.getElementById('input-label');

        let isStopMode = false;

        ipcRenderer.on('interrupt-mode', (event, mode) => {
            isStopMode = (mode === 'stop');
            if (isStopMode) {
                document.title = '记录本次专注事项 - TimeEnd';
                pageIcon.textContent = '✏️';
                pageTitle.textContent = '记录本次专注事项';
                pageMessage.textContent = '填写本次专注完成的内容（可选），提交后将保存到记录中。';
                inputLabel.textContent = '本次专注事项：';
                input.placeholder = '例如：阅读、写代码...';
                submitBtn.textContent = '提交';
                submitBtn.disabled = false;
                skipBtn.style.display = 'inline-block';
                warningEl.style.display = 'none';
            }
        });

        function checkInput() {
            if (isStopMode) return;
            const hasInput = input.value.trim().length > 0;
            submitBtn.disabled = !hasInput;
        }

        input.addEventListener('input', checkInput);

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (isStopMode) submitBtn.click();
                else if (!submitBtn.disabled) submitBtn.click();
            }
        });

        submitBtn.addEventListener('click', () => {
            const inputText = input.value.trim();
            if (isStopMode || inputText.length > 0) {
                ipcRenderer.send('interrupt-submitted', inputText);
            }
        });

        skipBtn.addEventListener('click', () => {
            ipcRenderer.send('interrupt-submitted', '');
        });

        window.addEventListener('beforeunload', (e) => {
            if (isStopMode) return;
            if (input.value.trim().length === 0) {
                e.preventDefault();
                e.returnValue = '';
                ipcRenderer.send('check-input');
            }
        });

        ipcRenderer.on('check-input', () => {
            if (isStopMode) return;
            if (input.value.trim().length === 0) {
                alert('请先输入工作内容才能关闭窗口！');
                input.focus();
            }
        });

        input.focus();
    </script>
</body>
</html>
